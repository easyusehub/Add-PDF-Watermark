<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💧 Add Watermark | Free PDF Tool</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

<div class="container">
<h2>💧 Add Watermark</h2>

<div class="upload" onclick="document.getElementById('file').click()">📁 Click to upload PDF</div>
<input type="file" id="file" accept="application/pdf" hidden>

<input type="text" id="watermark" placeholder="Enter watermark text">

<select id="position">
  <option value="center">Center</option>
  <option value="top-left">Top Left</option>
  <option value="top-right">Top Right</option>
  <option value="bottom-left">Bottom Left</option>
  <option value="bottom-right">Bottom Right</option>
</select>

<input type="color" id="color" value="#808080">
<input type="number" id="size" value="50" min="10" max="150" placeholder="Font size">

<button onclick="addWatermark()">Add Watermark</button>
<button id="download-btn">📥 Download PDF</button>
<p id="status">No file selected</p>

<div class="bottom-buttons">
<a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1">📂 All PDF Tools</a>
<a href="https://easyusehub.blogspot.com/?m=1">🏠 Home</a>
</div>
</div>

<script>
let file = null;
let downloadUrl = '';

document.getElementById('file').addEventListener('change', e => {
    file = e.target.files[0];
    document.getElementById('status').textContent = file ? file.name : 'No file selected';
});

function hexToRgb(hex) {
    hex = hex.replace("#","");
    return {
        r: parseInt(hex.substring(0,2),16),
        g: parseInt(hex.substring(2,4),16),
        b: parseInt(hex.substring(4,6),16)
    };
}

async function addWatermark(){
    if(!file){ alert('Upload PDF first'); return; }
    const text = document.getElementById('watermark').value;
    if(!text){ alert('Enter watermark text'); return; }

    const pos = document.getElementById('position').value;
    const colorHex = document.getElementById('color').value;
    const size = parseInt(document.getElementById('size').value) || 50;

    if(file.size > 20 * 1024 * 1024){ alert('File too large! Max 20MB'); return; }

    document.getElementById('status').textContent = "Processing...";

    try {
        const arrayBuffer = await file.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
        const pages = pdfDoc.getPages();

        const rgb = hexToRgb(colorHex);

        pages.forEach(page => {
            const { width, height } = page.getSize();
            let x = width/4, y = height/2;

            switch(pos){
                case "top-left": x=50; y=height-100; break;
                case "top-right": x=width-200; y=height-100; break;
                case "bottom-left": x=50; y=50; break;
                case "bottom-right": x=width-200; y=50; break;
                case "center": x=width/4; y=height/2; break;
            }

            page.drawText(text, {
                x:x,
                y:y,
                size:size,
                opacity:0.3,
                rotate: PDFLib.degrees(-45),
                color: PDFLib.rgb(rgb.r/255, rgb.g/255, rgb.b/255)
            });
        });

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], {type:'application/pdf'});
        downloadUrl = URL.createObjectURL(blob);

        const dlBtn = document.getElementById('download-btn');
        dlBtn.style.display = 'block';
        dlBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = 'watermarked.pdf';
            a.click();
        };

        document.getElementById('status').textContent = "✔ PDF ready! Click Download.";
    } catch(e){
        console.error(e);
        document.getElementById('status').textContent = "❌ Error adding watermark!";
    }
}
</script>

</body>
</html>
