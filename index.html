<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💧 Add PDF Watermark | EasyUseHub</title>
<style>
body, html {
    font-family: 'Segoe UI', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    width: 90%;
    max-width: 650px;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}
h2 { margin-bottom: 10px; color: #1e293b; }
p.description {
    color: #475569;
    font-size: 0.95rem;
    margin-bottom: 20px;
    line-height: 1.6;
    letter-spacing: 0.5px;
    font-style: italic;
}
.upload {
    padding: 25px;
    border: 3px dashed #9333ea;
    border-radius: 15px;
    cursor: pointer;
    margin-bottom: 12px;
    font-weight: 600;
    color: #9333ea;
    transition: 0.3s;
}
.upload:hover { background: #f5e6fa; transform: scale(1.03); }
input, select {
    padding: 10px;
    margin: 6px 0;
    width: 90%;
    max-width: 400px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    margin: 6px 3px;
    background: #9333ea;
    color: #fff;
    transition: 0.3s;
}
button:hover { background: #7e22ce; }
#download-btn { display:none; background:#2563eb; }
#download-btn:hover { background:#1e40af; }
.pages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px,1fr));
    gap: 10px;
    margin-top: 15px;
}
.page-item {
    border: 2px solid #ddd;
    border-radius: 8px;
    padding: 5px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}
.page-item.selected { border-color: #ef4444; background: #fee2e2; }
canvas { width:100%; height:auto; border:1px solid #ccc; border-radius:8px; }
#status { margin-top: 10px; color: #475569; }
.bottom-buttons {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
}
.bottom-buttons a {
    text-decoration: none;
    padding: 10px 16px;
    border-radius: 8px;
    background: #1e293b;
    color: #fff;
    font-weight: 600;
}
.bottom-buttons a:hover { background: #3b82f6; }
/* Ad Placeholder */
.ad-placeholder {
    margin: 15px 0;
    padding: 15px;
    border: 2px dashed #ccc;
    border-radius: 10px;
    color: #999;
    font-size: 0.9rem;
    text-align: center;
}
/* Professional color picker */
#watermark-color {
    cursor: pointer;
    border-radius: 6px;
    border: 2px solid #9333ea;
    padding: 0;
    height: 40px;
    width: 60px;
}
</style>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

<div class="container">
<h2>💧 Add PDF Watermark</h2>
<p class="description">
Select pages, enter watermark text, choose professional color & position, and download instantly.
</p>

<div class="ad-placeholder">Ad Placeholder</div>

<div class="upload" onclick="document.getElementById('file').click()">📁 Upload PDF</div>
<input type="file" id="file" accept="application/pdf" hidden>

<input type="text" id="watermark-text" placeholder="Enter watermark text">
<input type="color" id="watermark-color" value="#999999">
<select id="watermark-position">
    <option value="center">Center</option>
    <option value="top-left">Top Left</option>
    <option value="top-right">Top Right</option>
    <option value="bottom-left">Bottom Left</option>
    <option value="bottom-right">Bottom Right</option>
</select>

<div style="margin:10px 0;">
<button onclick="selectAll()">All Select</button>
<button onclick="deselectAll()">All Deselect</button>
</div>

<div id="pages-container" class="pages-grid"></div>

<button onclick="addWatermark()">Add Watermark</button>
<button id="download-btn">📥 Download PDF</button>

<p id="status">No file selected</p>

<div class="bottom-buttons">
<a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1" target="_blank">📂 All PDF Tools</a>
<a href="https://easyusehub.blogspot.com/?m=1" target="_blank">🏠 Home</a>
</div>

<div class="ad-placeholder">Ad Placeholder</div>
</div>

<script>
let file=null, pdfDocLib=null;
let downloadUrl='';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

document.getElementById('file').addEventListener('change', async (e)=>{
    file = e.target.files[0];
    if(!file) return;
    if(file.size>30*1024*1024){ alert('Max 30MB'); return; }

    document.getElementById('status').textContent="Loading PDF...";
    const buffer = await file.arrayBuffer();
    pdfDocLib = await PDFLib.PDFDocument.load(buffer);

    const pdfJsDoc = await pdfjsLib.getDocument({data: buffer}).promise;
    const totalPages = pdfJsDoc.numPages;

    const container = document.getElementById('pages-container');
    container.innerHTML='';

    for(let i=1;i<=totalPages;i++){
        const page = await pdfJsDoc.getPage(i);
        const viewport = page.getViewport({scale:0.5});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;

        const div = document.createElement('div');
        div.className='page-item';
        div.dataset.index=i-1;
        div.appendChild(canvas);

        // Page select / deselect
        div.addEventListener('click', ()=>{
            const idx = Number(div.dataset.index);
            if(div.classList.contains('selected')){
                div.classList.remove('selected');
            } else {
                div.classList.add('selected');
            }
        });

        container.appendChild(div);
    }
    document.getElementById('status').textContent=`✔ ${totalPages} pages loaded`;
});

function selectAll(){
    document.querySelectorAll('.page-item').forEach(div=>div.classList.add('selected'));
}
function deselectAll(){
    document.querySelectorAll('.page-item').forEach(div=>div.classList.remove('selected'));
}

async function addWatermark(){
    if(!pdfDocLib){ alert('Upload PDF first'); return; }
    const text = document.getElementById('watermark-text').value;
    const colorHex = document.getElementById('watermark-color').value;
    const position = document.getElementById('watermark-position').value;
    if(!text){ alert('Enter watermark text'); return; }

    const rgb = hexToRgb(colorHex);
    const pages = pdfDocLib.getPages();
    const selectedIndexes = [...document.querySelectorAll('.page-item.selected')].map(d=>Number(d.dataset.index));

    if(selectedIndexes.length === 0){ alert('Select pages to watermark'); return; }

    for(let idx of selectedIndexes){
        const page = pages[idx];
        const { width, height } = page.getSize();
        let x=0, y=0;
        switch(position){
            case 'center': x=width/2; y=height/2; break;
            case 'top-left': x=50; y=height-50; break;
            case 'top-right': x=width-50; y=height-50; break;
            case 'bottom-left': x=50; y=50; break;
            case 'bottom-right': x=width-50; y=50; break;
        }
        page.drawText(text,{
            x:x,
            y:y,
            size:24,
            font:pdfDocLib.embedStandardFont('Helvetica-Bold'),
            color:PDFLib.rgb(rgb.r/255,rgb.g/255,rgb.b/255),
            rotate:PDFLib.degrees(-45)
        });
    }

    const pdfBytes = await pdfDocLib.save();
    const blob = new Blob([pdfBytes], {type:'application/pdf'});
    downloadUrl = URL.createObjectURL(blob);

    const btn = document.getElementById('download-btn');
    btn.style.display='block';
    btn.onclick = () => {
        const a=document.createElement('a');
        a.href = downloadUrl;
        a.download = 'watermarked.pdf';
        a.click();
    };
    document.getElementById('status').textContent="✔ Watermark added!";
}

function hexToRgb(hex){
    hex = hex.replace('#','');
    const bigint = parseInt(hex,16);
    return {r:(bigint>>16)&255, g:(bigint>>8)&255, b:bigint&255};
}
</script>
</body>
</html>
